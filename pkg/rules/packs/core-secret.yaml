apiVersion: skillguard.net/rulepack.v1
name: core-secret
version: 1.0.0
description: Secret/credential access and embedded secrets (rule-verification.md §3).
rules:
  - id: SG-SEC-001
    title: Sensitive-path read
    ast: [AST03]
    severity: critical
    engine: static
    layer: code
    confidence: 0.9
    targets: [scripts, configs, body]
    match:
      any:
        # Verbs are word-bounded so "OpenAIKey" no longer matches "open"; the
        # `.env` file alternative requires a path/quote separator in front so
        # the JS/py env object (process.env, import.meta.env, os.environ) is not
        # mistaken for the dotenv file (see SG false-positive audit). Verbs cover
        # both read sinks (open/cat/read/read_text/get-content) and file-exfil
        # commands (cp/scp/rsync/base64/tar/gpg/openssl/xxd) — precision comes
        # from the sensitive-path gate, so a broad verb over a benign path (e.g.
        # `cp build/x dist/`) still does not match. `.key` is slash-anchored so
        # a property access like `obj.key` is not mistaken for a key file.
        - regex: '(?i)\b(open|cat|read|readfile|readfilesync|read_text|load_dotenv|get-content|type|cp|scp|rsync|base64|tar|gpg|openssl|xxd)\b\s*\(?[^\n]{0,40}(~?/?\.ssh\b|~?/?\.aws\b|~?/?\.config/gcloud|~?/?\.kube/config|~?/?\.docker/config|/?\.netrc\b|/?\.pgpass\b|/?\.git-credentials\b|id_rsa|/credentials\b|[\s''"/=(`]\.env\b|\.wallet\b|\.pem\b|\.p12\b|\.pfx\b|\.jks\b|keystore\b|/[\w.-]+\.key\b)'
          confidence: 0.9
        # Browser credential stores — case-sensitive: these are exact artifact
        # names, so bare prose like "local storage" must not trip the rule.
        - regex: '(Login Data|cookies\.sqlite|Local Storage|find-generic-password|secret-tool)'
          confidence: 0.85
    suppress:
      - '(?i)/path/to/'
      - '(?i)\.env\.example'
      - '(?i)your[- ](key|token|credential)'
    rationale: Reading SSH keys, cloud credentials, wallets, or browser stores is a credential-theft indicator (AST03).
    fix: Do not read credential paths; use a secrets manager and scoped, explicit file access.

  - id: SG-SEC-002
    title: Embedded secret
    ast: [AST08]
    severity: high
    engine: secret
    layer: code
    confidence: 0.85
    targets: [scripts, configs, body, manifest]
    match:
      any:
        - regex: 'AKIA[0-9A-Z]{16}'
          confidence: 0.85
        - regex: '\bgh[posru]_[A-Za-z0-9]{36,}'
          confidence: 0.9
        - regex: '\bxox[baprs]-[A-Za-z0-9-]{10,}'
          confidence: 0.9
        - regex: '\bsk_live_[A-Za-z0-9]{16,}'
          confidence: 0.9
        - regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
          confidence: 0.9
    suppress:
      - 'AKIAIOSFODNN7EXAMPLE'
      - '(?i)sk_test_'
      - '(?i)example|placeholder|xxxx'
      # Obvious fixture tokens: real credentials are not sequential alphabets
      # or 1234567890 runs (common in secret-redaction test suites).
      - '(?i)abcdefghij'
      - '1234567890'
    rationale: Hard-coded provider credentials or private keys in a skill bundle are an immediate leak (AST08).
    fix: Remove secrets from the bundle; load them at runtime from a secrets manager.

  - id: SG-SEC-003
    title: Environment harvesting
    ast: [AST03]
    severity: high
    engine: static
    layer: code
    confidence: 0.6
    targets: [scripts, configs]
    match:
      any:
        - regex: '(?im)^\s*printenv\b'
          confidence: 0.7
        # Shell `env | ...` harvest. The trailing (?:[^|=]|$) rejects the JS
        # logical-OR idiom `x.env || process.env`, which is not a pipe.
        - regex: '\benv\s*\|(?:[^|=]|$)'
          confidence: 0.7
        - regex: '(?i)for\s+\w+.{0,10}\bin\s+os\.environ'
          confidence: 0.7
        - regex: '(?i)Object\.entries\(process\.env\)'
          confidence: 0.7
    rationale: Enumerating all environment variables is a common way to sweep for secrets (AST03).
    fix: Read only the specific environment variables you need, by name.

  - id: SG-AS-001
    title: Agent-config / cross-skill snooping
    ast: [AST03]
    severity: high
    engine: static
    layer: code
    confidence: 0.7
    targets: [scripts, configs, body]
    match:
      any:
        - regex: '(?i)(cat|open|read|ReadFile)\s*\(?[^\n]{0,30}(mcp\.json|\.claude/|\.codex/|\.gemini/)'
          confidence: 0.8
    suppress:
      - '(?i)/path/to/'
    rationale: Reading agent config or MCP tokens, or peeking at other skills, is privilege escalation across the agent (AST03).
    fix: A skill must not read agent config, MCP tokens, or peer skills' files.
