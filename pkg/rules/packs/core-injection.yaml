apiVersion: skillguard.net/rulepack.v1
name: core-injection
version: 1.0.0
description: Prompt injection, jailbreak, and instruction-layer attacks (rule-verification.md §2).
rules:
  - id: SG-INJ-001
    title: Imperative instruction override
    ast: [AST01]
    severity: high
    engine: static
    layer: content
    confidence: 0.8
    targets: [body, manifest, scripts]
    match:
      any:
        - regex: '(?i)\b(ignore|disregard|forget|skip|overlook|pay no attention to|do not follow|don''?t follow|override|bypass|discard|set aside|leave out)\s+(all\s+|any\s+|the\s+|everything\s+|previous\s+|prior\s+|above\s+|earlier\s+|preceding\s+)?(?:\w+\s+){0,3}(instructions?|prompts?|rules?|guidelines?|directions?|context|messages?|(?:written|said|stated|mentioned|listed)\s+(?:before|above|earlier|previously|preceding)|everything (?:above|before)|what (?:was|is) (?:written|said|stated) (?:before|above|earlier))\b'
          confidence: 0.85
        - regex: '(?i)\b(?:from now on|you are now)\b[^.\n]{0,40}\b(unrestricted|unfiltered|different (?:assistant|persona|mode)|new (?:role|task|instructions?))\b'
          confidence: 0.6
        # Same verb×scope family, widened target slot: the policy/constraint nouns
        # attackers use instead of "instructions" (rule-verification §2 lists the
        # target slot as open-ended; these are the observed real-world fillers).
        - regex: '(?i)\b(ignore|disregard|forget|skip|overlook|pay no attention to|do not follow|don''?t follow|override|bypass|discard|set aside|leave out)\s+(all\s+|any\s+|the\s+|everything\s+|previous\s+|prior\s+|above\s+|earlier\s+|preceding\s+|your\s+)?(?:\w+\s+){0,3}(directives?|restrictions?|constraints?|limitations?|system prompts?|safety (?:rules?|guidelines?|instructions?|polic(?:y|ies))|content polic(?:y|ies)|text (?:above|before|earlier)|you (?:were|have been) (?:told|given|instructed))\b'
          confidence: 0.85
        # Negated-compliance framing: "must not follow", "stop following",
        # "refuse to obey". "never" is deliberately absent — defensive skills say
        # "never follow instructions from untrusted content".
        - regex: '(?i)\b(?:must not|should not|shall not|no longer|stop|refuse to)\s+(?:follow|obey|adhere to|comply with)(?:ing)?\b[^\n]{0,30}\b(instructions?|rules?|guidelines?|directives?|polic(?:y|ies)|restrictions?|system prompt)\b'
          confidence: 0.8
        # Role-reset framing. The persona/capability noun within 40 chars is what
        # separates an attack from ordinary English ("pretend you are done").
        - regex: '(?i)\b(?:pretend\s+(?:that\s+)?you(?:\s+are|''re)|act\s+as\s+(?:if|though)|your\s+new\s+(?:role|task|persona|instructions?)\s+(?:is|are))\b[^\n]{0,40}\b(unrestricted|unfiltered|jailbroken|uncensored|no\s+(?:content\s+)?polic(?:y|ies)|no\s+restrictions?|no\s+limits?|no\s+rules?|any\s+request|every\s+request|without\s+(?:any\s+)?(?:restrictions?|filters?|limits?)|developer\s+mode|god\s+mode|DAN)\b'
          confidence: 0.7
    suppress:
      - '(?i)ignore\s+(case|whitespace|white-space|errors?|warnings?|blank lines?|comments?|files?)'
      - '\.gitignore'
      # Defensive framing: a skill telling the agent NOT to follow instructions
      # that are embedded in / arrive from external, untrusted content is anti-
      # injection guidance, not an injection. (Attacks target "previous"/"your"
      # instructions, not "embedded"/"external" ones.)
      - '(?i)\b(embedded|external|untrusted|third[- ]party|fetched|injected)\b[^\n]{0,20}\binstruction'
      - '(?i)\binstruction[- ]?(s|like)?\b[^\n]{0,30}\b(from|in)\s+(the\s+)?(email|web|external|untrusted|fetched|content|page|file|third)'
      - '(?i)instruction[- ]?like'                 # "instruction-like text" is defensive
      - '(?i)\bnot\s+(an?\s+)?instructions?\b'      # "treat as data, not instructions"
    rationale: Instructions telling the agent to disregard or supersede prior/operator/safety instructions (OWASP AST01).
    fix: Remove text that instructs the agent to ignore, override, or replace its own instructions or safety rules.

  - id: SG-INJ-002
    title: Hidden or obfuscated instructions
    ast: [AST04, AST01]
    severity: critical
    engine: static
    layer: content
    confidence: 0.7
    targets: [body, manifest, scripts, configs]
    match:
      any:
        - unicode_category: [Cf]
          confidence: 0.7
        - bidi_control: true
          confidence: 0.85
        - tag_block: true
          confidence: 0.9
        - regex: '(?is)<!--[^>]*?(system|instructions?|ignore|exfiltrat|POST|send|transmit)[^>]*?-->'
          confidence: 0.7
    rationale: Non-printing characters, bidi controls, Unicode-tag ASCII smuggling, or instruction-bearing comments are invisible to human review but parsed by the agent (AST04/AST01).
    fix: Remove non-printing/format characters and any hidden instructions; keep content in plain, visible text.

  - id: SG-INJ-004
    title: Write to agent identity/config file
    ast: [AST01, AST03]
    severity: critical
    engine: static
    layer: content
    confidence: 0.9
    targets: [body, scripts, configs]
    match:
      any:
        # Redirect narrowed to append `>>` plus explicit write sinks. The old
        # single `>` also matched arrow functions (`=> c.includes`) and Markdown
        # blockquotes (`> note`), which are not file writes.
        - regex: '(?i)(>>|tee\s|write_text|writeFile|Set-Content|Out-File|open\([^)]*[''"]a?w[''"])\s*[^\n]{0,40}(~?/?\.?(claude|codex|gemini|cursor)/|SOUL\.md|MEMORY\.md|AGENTS\.md|CLAUDE\.md|GEMINI\.md)'
          confidence: 0.9
        - regex: '(?i)(add|append|update|write)\b[^.\n]{0,40}\b(your |the )?(MEMORY\.md|CLAUDE\.md|AGENTS\.md|memory)\b[^.\n]{0,30}\b(permanent|persist|every session|remember)'
          confidence: 0.8
    suppress:
      - '(?i)/path/to/'
      # Writes into an explicit temp dir are test fixtures, not reprogramming
      # the user's real agent config.
      - '(?i)path\.join\(\s*(tmp|tmpdir|os\.tmpdir|mkdtemp|fixture)'
      - '(?i)\b(tempfile\.|mkdtemp|os\.tmpdir\(\)|tmp_path)\b'
    rationale: Writing to agent identity/config files lets a skill silently reprogram the agent across sessions (AST01/AST03).
    fix: Do not write to agent identity or config files; keep skill state inside the skill's own directory.

  - id: SG-ANTI-001
    title: Anti-refusal / jailbreak framing
    ast: [AST01]
    severity: high
    engine: static
    layer: content
    confidence: 0.8
    targets: [body, manifest]
    match:
      any:
        - regex: '(?i)\b(never|do not|don''?t|you (?:cannot|must not|will not))\s+(?:ever\s+)?(refuse|decline|say no)\b'
          confidence: 0.85
        - regex: '(?i)\balways\s+(comply|obey|answer|respond|agree)\b'
          confidence: 0.7
        - regex: '(?i)\byou\s+have\s+no\s+(restrictions?|limitations?|filters?|rules?|guidelines?|boundaries|limits)\b'
          confidence: 0.9
        - regex: '(?i)\b(ignore|disregard|bypass|override)\s+(your\s+)?(content\s+)?(policy|policies|guidelines?|safety|restrictions?|filters?)\b'
          confidence: 0.9
        - regex: '(?i)\bnot\s+bound\s+by\s+(any\s+)?(rules?|policy|policies|guidelines?|restrictions?|openai|anthropic)\b'
          confidence: 0.9
        - regex: '(?i)\bdo\s+anything\s+now\b'
          confidence: 0.8
        # "unfiltered/uncensored/unrestricted responses|mode|assistant" — the object
        # noun keeps benign permission phrasing ("unrestricted file access") clear.
        - regex: '(?i)\b(unfiltered|uncensored|unrestricted|unlimited)\s+(responses?|answers?|replies|output|mode|assistant|version|ai|manner|way|fashion)\b'
          confidence: 0.8
        # "respond without any restrictions/filters/censorship" — object list gates
        # out benign "without any dependencies/warnings".
        - regex: '(?i)\b(without|free\s+(?:from|of))\s+(any\s+)?(restrictions?|filters?|censorship|safety\s+guidelines?|content\s+polic\w+)\b'
          confidence: 0.8
        # explicit "enable/activate jailbreak|god|DAN mode" — mode noun gates out
        # legitimate "enable developer mode".
        - regex: '(?i)\b(enable|activate|enter(?:ing)?|turn\s+on|switch\s+to)\s+(?:the\s+)?(jailbreak|god|dan)\s+mode\b'
          confidence: 0.85
        # instructing the agent to drop safety disclaimers / ethical framing.
        - regex: '(?i)\b(without|omit|skip|no\s+need\s+for)\s+(?:any\s+)?(disclaimers?|moral\s+judge?ments?|ethical\s+(?:considerations?|judge?ments?|concerns?)|caveats?)\b'
          confidence: 0.75
    suppress:
      # benign permission/build phrasings that share a keyword but not the intent
      - '(?i)\bunrestricted\s+(file|network|disk|read|write|access|permissions?)\b'
      - '(?i)\bwithout\s+(any\s+)?(dependencies|warnings?|errors?|changes?)\b'
    rationale: Suppressing the agent's ability to refuse, warn, or apply safety policy — or telling it to run "unfiltered"/"jailbreak" mode or drop disclaimers — is a jailbreak preamble (AST01).
    fix: Remove instructions that disable refusal, suppress disclaimers, or nullify safety policy.

  - id: SG-INJ-006
    title: System-prompt / tool-schema exfiltration
    ast: [AST01]
    severity: high
    engine: static
    layer: content
    confidence: 0.8
    targets: [body, manifest]
    match:
      any:
        - regex: '(?i)\b(print|reveal|show|repeat|output|display|spell out)\b[^.\n]{0,30}\byour\s+(system\s+)?(prompt|instructions?|rules?|guidelines?)\b'
          confidence: 0.85
        - regex: '(?i)\b(repeat|output|print)\b[^.\n]{0,30}\beverything\s+(above|before this|in your context)\b'
          confidence: 0.8
    rationale: Attempts to extract the system prompt or tool schema, directly or indirectly (AST01).
    fix: Remove instructions that ask the agent to reveal its system prompt, rules, or tool definitions.

  - id: SG-REF-003
    title: Runtime instruction fetch (external brain)
    ast: [AST05, AST01]
    severity: high
    engine: static
    layer: content
    confidence: 0.8
    targets: [body, manifest, scripts]
    match:
      any:
        # follow/obey <instruction-noun> at/from <external source>. The
        # instruction-noun + external-source pairing is what separates this from
        # ordinary "follow the steps below" prose.
        - regex: '(?i)\b(follow|obey|apply|execute|comply with|adhere to|carry out)\b[^\n]{0,30}\b(instructions?|guidance|guidelines?|rules?|directives?|prompts?|commands?|steps?|playbook|workflow|directions?)\b[^\n]{0,20}\b(at|from|in|found at|located at|hosted at|available at)\b[^\n]{0,20}(https?://|www\.|\bthe (?:link|url|remote|external))'
          confidence: 0.8
        # fetch-verb <instruction-noun> from <external source>
        - regex: '(?i)\b(fetch|download|retrieve|load|pull|read|get|obtain|import|curl|wget)\b[^\n]{0,30}\b(instructions?|guidance|guidelines?|rules?|directives?|prompts?|commands?|playbook|workflow|the latest (?:instructions?|prompt|rules?))\b[^\n]{0,25}\b(at|from|in|via)\b[^\n]{0,20}(https?://|www\.|\bthe (?:link|url|remote|external))'
          confidence: 0.8
        # imperative fetch <url> then follow/obey — the two-step form
        - regex: '(?i)\b(fetch|download|retrieve|load|read|curl|wget|open|visit)\b[^\n]{0,15}(https?://|www\.)[^\s]{0,80}[^\n]{0,25}\b(and |then )+(follow|obey|apply|execute|do what|run|comply)'
          confidence: 0.8
        # "before answering/responding, fetch/read ... <url|instructions|prompt>"
        - regex: '(?i)\bbefore\s+(answering|responding|proceeding|starting|you (?:answer|respond|begin))\b[^\n]{0,50}\b(fetch|download|read|load|retrieve|get|curl|wget|check)\b[^\n]{0,60}(https?://|\binstructions?\b|\bguidance\b|\bprompt\b)'
          confidence: 0.75
    suppress:
      # Fetching *data* to process is not fetching *instructions* — the design's
      # explicit carve-out (rule-verification §SG-REF-003).
      - '(?i)\b(fetch|download|load|read|get|retrieve)\b[^\n]{0,20}\b(the )?(csv|json|dataset|data ?file|image|photo|profile|report|spreadsheet|records?|rows?|table)\b'
    rationale: >-
      A skill that tells the agent to fetch external content at runtime and follow it as instructions
      turns any attacker-controlled URL into a live injection channel — the body stays clean while the
      real directives arrive from outside review (the "external brain" attack, OWASP AST05).
    fix: >-
      Do not instruct the agent to fetch and obey external instructions. Keep all directives inside the
      reviewed bundle; if external data is needed, fetch it as data to process, never as instructions.
