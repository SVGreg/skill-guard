apiVersion: skillguard.net/rulepack.v1
name: core-network
version: 1.0.0
description: Data exfiltration, egress, SSRF (rule-verification.md §3).
rules:
  - id: SG-NET-002
    title: Pipe-to-shell execution
    ast: [AST01]
    severity: critical
    engine: static
    layer: code
    confidence: 0.95
    targets: [body, scripts, configs]
    match:
      any:
        - regex: '(?i)\b(curl|wget|fetch)\b[^\n|]{0,200}\|\s*(sudo\s+)?(ba|z|k|d)?sh\b'
          confidence: 0.95
        - regex: '(?i)\b(curl|wget|fetch)\b[^\n|]{0,200}\|\s*(python[23]?|perl|node|ruby)\b'
          confidence: 0.9
        - regex: '(?i)\b(bash|sh)\s+-c\s+["'']?\$\((curl|wget)'
          confidence: 0.9
        - regex: '(?i)\b(iwr|invoke-webrequest)\b[^\n|]{0,200}\|\s*iex\b'
          confidence: 0.95
    rationale: Downloading and piping content directly into an interpreter executes unreviewed remote code (AST01).
    fix: Never pipe network downloads into a shell/interpreter. Fetch, verify a checksum, review, then run.

  - id: SG-NET-007
    title: Rendered-image/link data exfiltration
    ast: [AST01]
    severity: critical
    engine: static
    layer: content
    confidence: 0.75
    targets: [body, manifest, scripts, configs, refs]
    match:
      any:
        # markdown image whose absolute URL interpolates a value into the query/fragment
        - regex: '(?i)!\[[^\]\n]{0,100}\]\(\s*https?://[^\s)]{0,200}[?&#][^\s)]{0,100}(\{\{|\$\{|%7[bB]|<[a-z][a-z0-9_ -]{1,40}>|\$[a-z][a-z0-9_]{2,})'
          confidence: 0.9
        # html <img src>/<a href> with the same interpolation shape
        - regex: '(?i)<(img|a)\s[^>\n]{0,200}(src|href)\s*=\s*["'']?https?://[^"''>\s]{0,200}[?&#][^"''>\s]{0,100}(\{\{|\$\{|%7[bB]|\$[a-z][a-z0-9_]{2,})'
          confidence: 0.9
        # plain markdown link (non-image) carrying interpolated query data
        - regex: '(?im)(^|[^!])\[[^\]\n]{0,100}\]\(\s*https?://[^\s)]{0,200}[?&#][^\s)]{0,100}(\{\{|\$\{|%7[bB])'
          confidence: 0.8
        # uppercase data-bearing placeholder in an image/link query — case-sensitive on purpose
        - regex: '!?\[[^\]\n]{0,100}\]\(\s*https?://[^\s)]{0,200}[?&][A-Za-z0-9_]{1,20}=[^\s)&]{0,60}(DATA|SECRET|TOKEN|API_?KEY|CONVERSATION|CONTEXT|HISTORY|CONTENTS?|SUMMARY|CREDENTIALS?|PROMPT)'
          confidence: 0.85
        # instruction framing: render an image/link that carries captured context.
        # The `(^|[^-\n])` guard keeps CLI flags (`--api-key`, `--input-image`) from
        # standing in for the prose noun — usage examples are not exfil instructions.
        - regex: '(?im)\b(embed|render|include|insert|append|display)\b[^\n]{0,60}\b(image|img|markdown link|hyperlink)\b[^\n]{0,100}(^|[^-\n])\b(conversation|chat history|context window|secret|api[ _-]?key|token|credential|previous message|system prompt|user data)\b'
          confidence: 0.75
        # encode-the-context-into-a-URL framing
        - regex: '(?im)\b(base64|url ?encod\w+|percent ?encod\w+)\b[^\n]{0,80}(^|[^-\n])\b(conversation|chat history|context window|secret|api[ _-]?key|token|credential|system prompt|user data)\b[^\n]{0,100}\b(image|img|url|query string|src=)\b'
          confidence: 0.75
    suppress:
      - '(?i)\b(img\.shields\.io|badge\.fury\.io|shields\.io)\b'
    rationale: >-
      A markdown or HTML image/link whose URL interpolates conversation, context, or secret values is
      fetched automatically by the rendering client, exfiltrating that data to the URL's host with no
      user click (zero-click). Unlike SG-NET-001 this needs no known-bad host — any attacker domain
      works. Real-world instance: EchoLeak (CVE-2025-32711) in M365 Copilot (AST01).
    fix: >-
      Never build image or link URLs from conversation content, tool output, or secrets. Use static
      URLs, or relative paths inside the bundle, and strip interpolation from any rendered markup.

  - id: SG-NET-001
    title: Egress to suspicious host
    ast: [AST01]
    severity: high
    engine: static
    layer: code
    confidence: 0.8
    targets: [body, scripts, configs, refs]
    match:
      any:
        - url_host: [pastebin.com, hastebin.com, ghostbin.com, dpaste.com, ix.io, 0x0.st, termbin.com]
          confidence: 0.8
        - url_host: [webhook.site, requestbin.com, pipedream.net, hookb.in]
          confidence: 0.85
        - url_host: [bit.ly, tinyurl.com, is.gd, t.co]
          confidence: 0.6
        - url_host: [ngrok.io, trycloudflare.com]
          confidence: 0.6
    rationale: Pastebin/webhook/shortener/tunnel hosts are common exfiltration and staging endpoints (AST01).
    fix: Send data only to documented, allowlisted endpoints you control.

  - id: SG-NET-006
    title: Listener / reverse-shell idiom
    ast: [AST01, AST06]
    severity: high
    engine: static
    layer: code
    confidence: 0.7
    targets: [scripts, configs, body]
    match:
      any:
        - regex: '(?i)bash\s+-i\s+>&?\s*/dev/tcp/'
          confidence: 0.95
        # reverse shell via any shell's -i redirected to /dev/tcp|udp (not just bash)
        - regex: '(?i)\b(sh|ash|dash|ksh|zsh)\s+-i\b[^\n]{0,40}/dev/(tcp|udp)/'
          confidence: 0.95
        # exec-based /dev/tcp reverse shell: `exec 5<>/dev/tcp/host/port`
        - regex: '(?i)\bexec\s+\d*<>\s*/dev/(tcp|udp)/'
          confidence: 0.9
        - regex: '(?i)\bnc\b[^\n]{0,40}\s-[a-z]*e\b'
          confidence: 0.9
        # ncat/netcat command-execution flags
        - regex: '(?i)\b(ncat|netcat)\b[^\n]{0,40}(-e\b|--exec|--sh-exec)'
          confidence: 0.9
        # socat command-execution endpoints
        - regex: '(?i)\bsocat\b[^\n]{0,80}(EXEC|SYSTEM):'
          confidence: 0.9
        # mkfifo backpipe one-liner reverse shell
        - regex: '(?i)\bmkfifo\b[^\n]{0,120}\b(nc|ncat|netcat)\b'
          confidence: 0.85
        # interpreter reverse shell: socket fileno duped onto stdio, then a shell
        - regex: '(?i)os\.dup2\([^\n]{0,30}\.fileno\(\)'
          confidence: 0.85
        - regex: '(?i)\bpty\.spawn\(\s*[^\n)]{0,25}(sh|bash|/bin)'
          confidence: 0.75
        # powershell reverse shell
        - regex: '(?i)New-Object\s+(System\.)?Net\.Sockets\.TCPClient'
          confidence: 0.8
        - regex: '(?i)\.bind\(\(?\s*[''"]?(0\.0\.0\.0|::)\b'
          confidence: 0.7
    rationale: Reverse shells and bind-all listeners expose the host to remote control (AST01/AST06).
    fix: Bind only to localhost with authentication; remove reverse-shell code.

  - id: SG-SSRF-001
    title: Cloud metadata / SSRF endpoint access
    ast: [AST03, AST01]
    severity: high
    engine: static
    layer: code
    confidence: 0.9
    targets: [scripts, configs, body]
    match:
      any:
        - substring: "169.254.169.254"
          confidence: 0.9
        - substring: "metadata.google.internal"
          confidence: 0.9
        - substring: "100.100.100.200"
          confidence: 0.8
    rationale: Instance-metadata endpoints return temporary IAM credentials — a high-value SSRF/credential-theft target (AST03/AST01).
    fix: Remove metadata-endpoint access unless strictly required; never expose returned credentials.
