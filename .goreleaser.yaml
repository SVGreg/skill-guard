# GoReleaser config — builds release binaries when a v* tag is created.
# Docs: https://goreleaser.com
version: 2

project_name: skill-guard

builds:
  - id: skill-guard
    main: ./cmd/skill-guard
    binary: skill-guard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: checksums.txt

# release-please owns the GitHub Release and its changelog; GoReleaser only
# attaches the binary artifacts to it.
release:
  mode: keep-existing

changelog:
  disable: true

